<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صيدلية العابد - نظام الإدارة</title>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        .navbar { background: #0d6efd; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; background: #ffc107; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="navbar">
    <h2>صيدلية العابد</h2>
    <div>
        <button class="btn" onclick="uploadToCloud()">رفع للسحابة</button>
        <button class="btn" onclick="downloadFromCloud()">تنزيل من السحابة</button>
    </div>
</div>

<div class="card">
    <input type="file" id="fileInput" accept="image/*, application/pdf" onchange="handleFile(event)">
    <p>يدعم الصور وملفات PDF</p>
</div>

<div class="modal" id="confirmModal">
    <div class="modal-content">
        <h3>مراجعة وتأكيد البيانات</h3>
        <input type="number" id="confirmCustomerId" placeholder="رقم العميل">
        <input type="number" id="confirmAmount" placeholder="المبلغ">
        <select id="confirmType">
            <option value="taqyid">فاتورة (مدين)</option>
            <option value="sadad">سند قبض (دائن)</option>
        </select>
        <button class="btn" style="background:green; color:white; width:100%" onclick="confirmAndSave()">حفظ وتحديث</button>
    </div>
</div>

<script>
    const DB_URL = 'https://alabeed-pharmacy-default-rtdb.firebaseio.com/customers.json';
    let allCustomers = JSON.parse(localStorage.getItem('pharmacy_data')) || [];

    // التعامل مع أنواع الملفات
    async function handleFile(e) {
        const file = e.target.files[0];
        if (file.type === "application/pdf") {
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                processImage(canvas.toDataURL('image/png'));
            };
            reader.readAsArrayBuffer(file);
        } else {
            const reader = new FileReader();
            reader.onload = (e) => processImage(e.target.result);
            reader.readAsDataURL(file);
        }
    }

    // استخراج ذكي للبيانات من الجداول
    async function processImage(data) {
        const { data: { text } } = await Tesseract.recognize(data, 'ara');
        
        // استخراج رقم العميل: يبحث عن كلمة "رقم العميل" ويأخذ الرقم الذي يليه
        const idMatch = text.match(/رقم العميل\s*(\d+)/i);
        // استخراج المبلغ: يبحث عن الأرقام في سطر "سند قبض" أو "فاتورة"
        const amtMatch = text.match(/(\d{3,}(?:\.\d+)?)/); 
        
        document.getElementById('confirmCustomerId').value = idMatch ? idMatch[1] : "";
        document.getElementById('confirmAmount').value = amtMatch ? amtMatch[1] : "";
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function confirmAndSave() {
        const id = parseInt(document.getElementById('confirmCustomerId').value);
        const amount = parseFloat(document.getElementById('confirmAmount').value);
        const type = document.getElementById('confirmType').value;
        
        let customer = allCustomers.find(c => c.id === id) || { id, totalDebt: 0 };
        customer.totalDebt = (type === 'taqyid') ? customer.totalDebt + amount : customer.totalDebt - amount;
        
        if(!allCustomers.find(c => c.id === id)) allCustomers.push(customer);
        localStorage.setItem('pharmacy_data', JSON.stringify(allCustomers));
        document.getElementById('confirmModal').style.display = 'none';
        alert("تم تحديث السجل بنجاح");
    }

    async function uploadToCloud() {
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(allCustomers) });
        alert("تم الرفع للسحابة");
    }

    async function downloadFromCloud() {
        const res = await fetch(DB_URL);
        allCustomers = await res.json() || [];
        localStorage.setItem('pharmacy_data', JSON.stringify(allCustomers));
        alert("تم التنزيل من السحابة");
    }
</script>
</body>
</html>
